# Bannach-Brown_2019 — Animal models of depression / antidepressant compounds
# SLIM Development/Training set; topic inferred from positive paper titles
# (serotonin transporter, antidepressants, rodent depression models)
# Source SR: Bannach-Brown et al. 2019 (preclinical depression model SLR)

pico:
  population: Rodents (rats or mice) used in preclinical models of depression or depression-like behavior (e.g., forced swim, tail suspension, chronic mild stress, learned helplessness, serotonin transporter knockout)
  intervention: Pharmacological agent (antidepressant or candidate compound), genetic manipulation, environmental enrichment/stress, or other experimental treatment
  comparator: Vehicle, sham, wild-type controls, or untreated reference group
  outcome: Behavioral measure of depression-like phenotype (immobility, anhedonia, sucrose preference, social interaction) or neurobiological correlate (neurogenesis, brain monoamine levels, gene expression in stress circuitry)

inclusion:
  - Used rodents (rats or mice) as the experimental subjects
  - Modeled depression or depression-related phenotype via stress, genetic, or pharmacological means
  - Tested an intervention or compared a knockout/transgenic line to a control group
  - Reported behavioral or neurobiological outcomes relevant to depression
  - Original empirical study published in a peer-reviewed journal

exclusion:
  - Used species other than rodents (humans, primates, fish, invertebrates) as the model
  - Studied a non-depression phenotype exclusively (Parkinson's, addiction, seizure, etc.) with no depression-related outcome
  - In vitro / cell-culture only studies with no whole-animal behavioral or systemic readout
  - Conference abstracts, letters, editorials, or reviews/meta-analyses with no primary data
  - Studies in healthy animals not subjected to any depression model or stressor
